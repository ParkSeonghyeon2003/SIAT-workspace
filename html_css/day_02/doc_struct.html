<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>시맨틱 요소(semantic element)-긱 요소가 의미(뜻)를 갖는다는 의미</title>
</head>

<body>
  <header>웹</header> <!-- 머리말 -->
  <nav> <!-- Navigation -->
    <ul>
      <li>html5</li>
      <li>css3</li>
      <li>javascript</li>
    </ul>
  </nav>
  <aside> <!-- aside: 부수 정보 -->
    <ul>
      <li>W3C</li>
      <li>ECMA</li>
      <li>IETF</li>
    </ul>
  </aside>
  <article> <!-- 주요 내용(본문) -->
    <h1>html5 문서 기본</h1>
    <p>기본 문서 만들기</p>
    <p>문서 꾸미기</p>
    <p>목록 나열하기</p>
    <p>표 그리기</p>
    <p>문서 특정부분 구분하기</p>
    <p>문서 구조화</p>
  </article>
  <footer>작성자: 히든 싱어 팀</footer>
</body>

</html>
