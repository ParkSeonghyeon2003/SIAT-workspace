<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title> FORM 입력 예제 </title>
</head>
<body>
  <h3>다양한 입력 폼</h3>
  <form method="get" action="result.html">
    <p>성명: <input type="text" name="name" placeholder="홍길동" required><br>
      성별:
      <input type="radio" name="gender" value="male">남성
      <input type="radio" name="gender" value="female">여성<br>
      과목:
      <select name="subject" size="1">
        <option value="html" selected>HTML</option>
        <option value="css" >CSS</option>
        <option value="javascript" >JavaScript</option>
        <option value="c" >C</option>
        <option value="java" >Java</option>
        <option value="python" >Python</option>
      </select>
    </p>
    <p>
      구입희망분야(복수선택 가능)<br>- 분야:
      <label>
        <input type="checkbox" name="field" value="computer">컴퓨터
        <input type="checkbox" name="field" value="economy">경제
        <input type="checkbox" name="field" value="common_sense">상식
      </label>
    </p>
    <p>
      비고:<br>
      <textarea rows="4" cols="40" name="textarea">
나는 &lt;textarea&gt; 입니다.
          속성은 rows="4" cols="40" 입니다.
      </textarea>
    </p>
    <p>파일 업로드하기(확장자 "png"인 파일만 보입니다)</p>
    <p><input type="file" name="file_name" accept=".png"></p>
    <hr>
    <p>
      <input type="submit" value="전송">
      <input type="reset" value="취소">
    </p>
  </form>
</body>
</html>
