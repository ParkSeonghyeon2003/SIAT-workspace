<!--
  CSS: Cascading Style Sheets. 폭포수처럼 위에서 아래로 계단식으로 스타일이
        적용되고 우선순위가 결정되는 형태라서 Cascading이라는 단어를 사용한다.
  Grid: 2차원 행렬 레이아웃
  Flexible box (Flexbox): 1차원 레이아웃
  -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>폰트 및 색상 지정</title>
  <style>
    body {
      background-color: paleturquoise;
    }

    h3 {
      color: midnightblue
    }

    p {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <h3>스타일시트 이해하기</h3>
  <p>이 예제는 <strong>CSS</strong>의 개념을 설명합니다.</p>
  <p>다음 예제로 이어집니다.</p>
</body>
</html>
