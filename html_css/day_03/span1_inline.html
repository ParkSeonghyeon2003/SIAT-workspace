    span {
      display: block;
      text-align: center;
      background-color: pink;
      width: 800px;
      height: 100px;
      margin-left: 20px;
    }

</head>
<body>
  <span>display속성의 inline은 줄바꿈이 되지 않고 width, height 적용이 안돼요 </span>
  <strong>제가 어디에 있나요?</strong>
</body>
</html>
