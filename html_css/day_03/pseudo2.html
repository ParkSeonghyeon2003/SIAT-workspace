<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>가상클래스(pseudo class) 선택지 - ':' 기호를 사용하는 선택자</title>
  <style>
    a:link {
      color: orange;
    }
    a:hover {
      text-decoration: none;
      color: black;
    }
    a:visited {
      color: red;
    }
    a:active {
      color: green
    }
  </style>
</head>
<body>
  <h1>링크 선택자</h1>
  <h1><a>Nothing</a></h1>
  <h1><a href="https://www.naver.com">naver</a></h1>
  <h1><a href="https://www.w3schools.com">w3schools</a></h1>
</body>
</html>
