<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>박스 모델(Box Model) : box-sizing:border-box</title>
  <style>
    div {
      box-sizing: border-box;
    }

    #first {
      background-color: red;
    }

    #second {
      background-color: orange;
      width: 100px;
      height: 100px;
    }

    #third {
      background-color: yellow;
      width: 100px;
      height: 100px;
      padding: 20px;
    }

    #fourth {
      background-color: green;
      width: 100px;
      height: 100px;
      padding: 20px;
      margin: 20px;
    }

    #fifth {
      background-color: blue;
      width: 100px;
      height: 100px;
      padding: 20px;
      margin: 20px;
      border: 10px solid olive;
      color: white;
    }
  </style>
</head>
<body>
  <div id="first">first</div>
  <div id="second">second</div>
  <div id="third">third</div>
  <div id="fourth">fourth</div>
  <div id="fifth">fifth</div>
</body>
</html>
