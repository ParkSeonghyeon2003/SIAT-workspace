<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>display : inline-block 적용 예</title>
  <style>
    /*
      inline-block은 block 처럼 width, height 조절이 가능하고,
      padding, border, margin 조절이 가능하다.
      inline처럼 옆에 다른 요소 배치가 가능하다.
     */

    span {
      display: inline-block;
      border: 5px dotted orange;
      background-color: pink;
      width: 500px;
      height: 100px;
      text-align: center;
    }
  </style>
</head>
<body>
  <span>display속성의 inline-block은 width, height 적용</span>
  <span>display속성의 inline-block은 width, height 적용</span>
</body>
</html>
