<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <style>    
    .flex-container > div {
      height: 500px;
      border: 1px solid black;
      display: flex;
    }

    #flex-start {
      align-items: flex-start;
    }

    #flex-end {
      align-items: flex-end;
    }

    #center {
      align-items: center;
    }

    #baseline{
      align-items: baseline;
    }

    #stretch {
      align-items: stretch;
    }
  </style>
</head>
<body>
  <div class="flex-container">
    <div id="flex-start">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
    <div id="flex-end">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
    <div id="center">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
    <div id="baseline">
      <div style="font-size: 20px; background: #ffd;">Text A</div>
      <div style="font-size: 40px; background: #cfc;">Text B</div>
      <div style="font-size: 28px; background: #ccf;">Text C</div>
    </div>
    <div id="stretch">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
  </div>
</body>
</html>
