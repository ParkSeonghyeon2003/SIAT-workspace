<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>전환 효과의 지정</title>
  <style>
    div {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      width: 100px;
      height: 100px;
      background: red;
      transition: width 1s, height 1s, background 1s;
    }

    div:hover {
      width: 300px;
      height: 300px;
      background: green;
      transition: width 1s, height 1s, background 1s;
    }
  </style>
</head>
<body>
  <h1>전환(transition)</h1>

  <p>박스에 마우스를 올려보세요</p>
  <div>
</body>
</html>
