<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <style>
    .flex-container > div {
      display: flex;
      margin: 25px auto;
    }

    #flex-start {
      justify-content: flex-start;
    }

    #flex-end {
      justify-content: flex-end;
    }

    #center {
      justify-content: center;
    }

    #space-between {
      justify-content: space-between;
    }

    #space-around {
      justify-content: space-around;
    }

    #space-evenly {
      justify-content: space-evenly;
    }
  </style>
</head>
<body>
  <div class="flex-container">
    <div id="flex-start">
      <img src="../img/strawberry.png" >
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
    <div id="flex-end">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
    <div id="center">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
    <div id="space-between">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
    <div id="space-around">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
    <div id="space-evenly">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
      <img src="../img/strawberry.png">
    </div>
  </div>
</body>
</html>
