<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>CSS3 Property Basic</title>
  <style>
    body > div {
      border: 3px solid black;
      width: 400px;
      height: 200px;
      position: relative;
    }

    div > div {
      width: 100px;
      height: 100px;
      position: absolute;
    }

    #box1 {
      background-color: red;
      top: 10px;
      left: 10px;
      z-index: 2;
    }

    #box2 {
      background-color: green;
      top: 50px;
      left: 50px;
      z-index: 1;
    }

    #box3 {
      background-color: blue;
      top: 90px;
      left: 90px;
    }
  </style>
</head>

<body>
  <h1>저는 h1태그 입니다.</h1>
  <div>
    <div id="box1"></div>
    <div id="box2"></div>
    <div id="box3"></div>
  </div>
  <h1>저는 h1태그 입니다.</h1>
</body>

</html>
