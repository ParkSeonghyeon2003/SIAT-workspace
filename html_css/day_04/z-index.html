<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>z-index로 앞뒤 배치 : 큰 수가 앞으로 배치된다.</title>
  <style>
    div {
      width: 100px;
      height: 100px;
    }

    #box1 {
      position: absolute;
      left: 30px;
      top: 50px;
      background-color: red;
    }

    #box2 {
      position: absolute;
      left: 55px;
      top: 75px;
      background-color: blue;
    }

    #box3 {
      position: absolute;
      left: 30px;
      top: 50px;
      background-color: red;
      z-index: 1;
      margin-top: 300px;
    }

    #box4 {
      position: absolute;
      left: 55px;
      top: 75px;
      background-color: blue;
      margin-top: 300px;
    }
  </style>
</head>
<body>
  <div id="box1"></div>
  <div id="box2"></div>
  <div id="box3"></div>
  <div id="box4"></div>
</body>
</html>
