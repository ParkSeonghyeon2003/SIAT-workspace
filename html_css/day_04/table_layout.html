<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>표의 레이아웃 지정</title>
  <style>
    /*
      em: 폰트 사이즈 기준의 단위 크기를 나타낸다.
      rem: root의 폰트 사이즈를 기준으로 하는 em 단위이다. 
     */
    #books {
      border-collapse: collapse;
      width: 500px;
      margin: 0 auto;
      text-align: center;
    }

    #books caption {
      font-size: 20px;
      font-weight: bold;
      margin: 0.5em;
    }

    th {
      background: gray;
      color: white;
      height: 2em;
    }

    td {
      border-bottom: 1px solid gray;
      height: 2em;
    }

    tbody tr:hover {
      background: lightgray;
    }
  </style>
</head>

<body>
  <table id="books">
    <caption>추천 도서 테이블</caption>
    <thead>
      <tr>
        <th>작가</th> <th>책제목</th> <th>출판사</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>윌터아이작슨</td> <td>스티브잡스</td> <td>민음사</td>
      </tr>
      <tr>
        <td>흥부와 놀부</td> <td>선과 악</td> <td>좋은출판사</td>
      </tr>
      <tr>
        <td>괴테</td> <td>파우스트</td> <td>교학사</td>
      </tr>
    </tbody>
  </table>  
</body>

</html>
