<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>글자색 반복</title>
  <style>
    @keyframes textColorAnimation {
      0% { color: hsl(0, 100%, 50%); }
      20% { color: hsl(60, 100%, 50%); }
      40% { color: hsl(120, 100%, 50%); }
      60% { color: hsl(180, 100%, 50%); }
      80% { color: hsl(240, 100%, 50%); }
      100% { color: hsl(360, 100%, 50%); }
    }

    body {
      background-color: black;
      text-align: center;
    }

    span {
      font-weight: bold;
      font-size: 70px;
      text-shadow: 0px 0px 20px;
      animation: textColorAnimation 2s infinite;
    }
  </style>
</head>
<body>
  <p><span>점심 맛있게 드셨나요?</span></p>
</body>
</html>
