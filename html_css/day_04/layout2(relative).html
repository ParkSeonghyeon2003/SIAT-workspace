<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>위치/크기 지정 속성</title>
  <style>
    div {
      width: 100px;
      height: 100px;
      display: inline-block;
      border: 1px solid lightgray;
      background: red;
    }

    #box1:hover {
      position: relative;
      top: 50px;
      left: 30px;
      background: green;
    }

    #box2:hover {
      position: relative;
      bottom: 20px;
      right: 20px;
      background: yellow;
    }
  </style>
</head>
<body>
  <h3>상대 위치</h3>
  <div></div>
  <div></div>
  <div id="box1"></div>
  <div id="box2"></div>
</body>
</html>
