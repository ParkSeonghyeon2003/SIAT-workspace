<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>단락과 줄</title>
</head>
<body>
  <h1>단락과 줄바꾸기</h1>
  줄이 바뀝니다.<br>
  줄이 바뀝니다.
  <!-- <br>: 줄 바꿈 -->
  <p>
    문단이 바뀝니다.
    <!-- <p>: 문단을 나눠서 단락을 생성(줄바꿈 2번 만큼의 공백) -->
  </p>
  <p>
    문단이 바뀝니다.
  </p>
  <hr>
  <!-- Horizontal Ruler : 수평선 그리기 -->
  <hr color="red">

  <h1>형식 그대로</h1>
  일반적인 HTML 문서에는 Enter키나 공백(Space)을              인식하지 못합니다.
  공백 인식 방법은 &nbsp;&nbsp;&nbsp;입니다.

  <pre>하지만 &lt;pre&gt; 태그 내부에서는 HTML 문서에 입력된 그대로       출력됩니다.</pre>

  <h1>인용</h1>
  <blockquote>
    &lt; or &gt;와 같은 특수문자는 웹 문서에서 태그를 표현하기 위해 사용하고 있습니다.
    그래서 직접 사용할 수 없습니다. 이를 해결하기 위해 특수문자를 사용합니다.<br>
    &#169; &#945; &#8364; &amp; &quot; &dArr;
  </blockquote>
</body>
</html>
