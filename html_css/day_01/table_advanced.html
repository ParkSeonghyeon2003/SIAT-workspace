<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>표 과제</title>
</head>

<body>
  <h1>추천도서 Table</h1>

  <table border="1">
    <caption> 추천 도서 표 </caption>
    <thead>
      <tr>
        <th>책제목</th>
        <th>작가</th>
        <th>가격</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <th>스티브잡스</th>
        <td>윌터아이작슨 저, 안진환 역</td>
        <td>15,000원</td>
      </tr>
      <tr>
        <th>나를 지키는 말 88</th>
        <td>손화신, 쌤앤파커스</td>
        <td>15,000원</td>
      </tr>
    </tbody>

    <tfoot>
      <tr>
        <th>총</th>
        <td>2권</td>
        <td>30,000원</td>
      </tr>
    </tfoot>
  </table>
</body>

</html>
