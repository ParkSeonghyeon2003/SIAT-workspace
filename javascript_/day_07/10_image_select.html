<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>radio 객체에서 선택한 그림 출력</title>
  </head>
  <body>
    <div>선택한 그림 출력</div>
    <hr>
    <div> radio 버튼을 클릭하면 이미지가 바뀝니다. </div>
    <form>
      <select id="icon">
        <option value="../../img/sharp.png">sharp</option>
        <option value="../../img/music.png" selected>music</option>
        <option value="../../img/call.png">call</option>
      </select>
      <img src="../../img/music.png" id="iconImg">
    </form>
    <script>
      const selEl = document.getElementById("icon");
      const imgEl = document.getElementById("iconImg");
      
      function changeImage(event) {
        console.log(event.target.value);
        imgEl.src = event.target.value;
      }

      selEl.addEventListener("change", changeImage);
    </script>
  </body>
</html>
