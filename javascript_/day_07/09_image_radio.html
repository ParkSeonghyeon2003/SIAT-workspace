<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>radio 객체에서 선택한 그림 출력</title>
  </head>
  <body>
    <div>선택한 그림 출력</div>
    <hr>
    <div> radio 버튼을 클릭하면 이미지가 바뀝니다. </div>
    <form>
      <label><input type="radio" name="icon" value="../../img/sharp.png">sharp </label>
      <label><input type="radio" name="icon" value="../../img/music.png" checked>music </label>
      <label><input type="radio" name="icon" value="../../img/call.png">call </label>
      <img src="../../img/music.png" id="iconImg">
    </form>
    <script>
      const inputEls = document.querySelectorAll("input[name=icon]");
      const imgEl = document.getElementById("iconImg");

      function changeImage(event) {
        imgEl.src = this.value;
      }

      inputEls.forEach(el => el.addEventListener("click", changeImage));
    </script>
  </body>
</html>
