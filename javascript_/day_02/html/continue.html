<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>continue</title>
  </head>
  <body>
    <script>
      let output = "";
      for (let i = 1; i <= 10; i++) {
        if (i == 4) {
          continue;
        }

        output += `${i}<hr>`;
      }

      document.body.innerHTML = output;
    </script>
  </body>
</html>
