<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title></title>
  </head>
  <body>
    <script>
      let input = prompt("숫자를 입력하세요.");
      if (input === null || input === "") {
        alert("값을 입력하세요.");
      } else {
        let n = Number(input);
        if (Number.isNaN(n)) {
          alert("숫자만 입력해야 합니다.");
        } else {
          alert(`입력한 숫자는 ${n}입니다.`);
        }
      }
    </script>
  </body>
</html>
