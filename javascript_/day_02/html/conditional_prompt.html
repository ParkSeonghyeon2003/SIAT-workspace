<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>조건 연산자(Conditional Operator)</title>
  </head>
  <body>
    <script>
      let age = Number(prompt("나이를 입력하세요."));
      let isAdult = (age >= 20) ? "성인" : "미성년자";

      document.body.innerHTML = `${age}세는 ${isAdult}입니다.`;
    </script>
  </body>
</html>
