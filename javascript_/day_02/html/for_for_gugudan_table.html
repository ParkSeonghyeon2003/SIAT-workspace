<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>temp</title>
  <style>
    table {
      border-collapse: collapse;
    }

    td {
      border: 1px solid black;
      padding: 10px 15px;
    }

    tr:nth-child(even) {
      background-color: #f3f4f6;
    }
  </style>
</head>

<body>
  <script>
    let table = "";
    for (let i = 1; i <= 9; i++) {
      table += "<tr>";
      for (let dan = 2; dan <= 9; dan++) {
        table += `<td>${dan} x ${i} = ${dan * i}</td>`;
      }
      table += "</tr>";
    }

    document.body.innerHTML = `
      <table>
        <tbody>
          ${table}
        </tbody>
      </table>
    `;
  </script>
</body>

</html>
