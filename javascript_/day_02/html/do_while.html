<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>Do While문 기본 예제</title>
  </head>
  <body>
    <script>
      let i = 1;
      let output = "";
      do {
        output += `${i}<hr>`;
        i++;
      } while (i <= 5);

      document.body.innerHTML = output;
    </script>
  </body>
</html>
