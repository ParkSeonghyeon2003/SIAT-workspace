<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>let과 const</title>
  </head>
  <body>
    <script>
      // const BAD_CASE;
      // 위 처럼 const를 선언만 할 수는 없다.
      // 무조건 초기화까지 동시에 해줘야 함

      const PI = 3.141592;
      // PI = 3.14;
      // const는 재할당 불가
      console.log(PI);

      const user = { name: "Kim" };
      user.name = "Lee";  // 내부 속성은 변경할 수 있음
      console.log(user.name);
    </script>
  </body>
</html>
