<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>break 문</title>
  </head>
  <body>
    <script>
      let output = "";

      outer:
      for (let i = 1; i <= 9; i++) {
        for (let dan = 2; dan <= 9; dan++) {
          if (i === 3 && dan === 3) {
            break outer;
          }
          output += `i=${i}, dan=${dan}<br>`;
        }
        output += '<hr>';
      }

      document.body.innerHTML = output;
    </script>
  </body>
</html>
