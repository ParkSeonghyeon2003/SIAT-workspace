<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>조건 연산자 (Conditional Operator)</title>
  </head>
  <body>
    <script>
      let num = 7;
      let msg = (num % 2 === 0) ? "짝수" : "홀수";
      document.body.innerHTML = `${num}점은 ${msg}입니다.`;
    </script>
  </body>
</html>
