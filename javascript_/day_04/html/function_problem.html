<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>인자가 더 많은 경우 (매개변수 < 인자)</title>
  </head>
  <body>
    <script>
      function getSum() {
        let sum = 0;
        for (let i = 0; i < arguments.length; i++) {
          const arg = arguments[i];
          console.log(`arguments[${i}]=${arg}`);
          sum += arg;
        }
        console.log(`합 = ${sum}`);
      }

      getSum(10, 20, 30, 40, 50);
    </script>
  </body>
</html>
