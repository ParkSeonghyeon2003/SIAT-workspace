<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>매개변수와 인자의 갯수가 일치</title>
  </head>
  <body>
    <script>
      function add(a, b) {
        let result = a + b;
        console.log(`덧셈 결과: ${result}`);
      }

      add(10, 20);
      add(5.5, 2.1);
    </script>
  </body>
</html>
