<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>매개변수와 인자 갯수가 일치하지 않는 경우</title>
  </head>
  <body>
    <script>
      // 기본값 매개변수(Default Parameter)
      function profile(name, age, city = "알 수 없음") {
        console.log("이름:", name);
        console.log("나이:", age);
        console.log("도시:", city);
      }

      profile("홍길동", 20);

      /*
        출력 결과:
        이름: 홍길동
        나이: 20
        도시: 알 수 없음 <--- 값이 전달되지 않아 city = "알 수 없음" 할당
       */
    </script>
  </body>
</html>
