<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>callback forEach</title>
  </head>
  <body>
    <script>
      const fruits = ['Apple', 'Pair', 'Banana'];

      let output = '';
      fruits.forEach(function(item, index) {
        output += `index=${index}, item=${item}<br>`;
      });

      document.body.innerHTML = output;
    </script>
  </body>
</html>
