<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>JSON.parse() 의미</title>
  </head>
  <body>
    <p>JSON 자바스크립트 객체/배열 → 문자열로 변환합니다.</p>
    <script>
      const user = { name:"Lee", age:30 };
      const jsonText = JSON.stringify(user);

      console.log(jsonText);
    </script>
  </body>
</html>
