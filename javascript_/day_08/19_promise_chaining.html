<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Promise 기본 실습</title>
  <link href="css/ex0403.css" rel="stylesheet">
</head>

<body>

<div class="container">
  <h2>Promise 기본 실습</h2>
  <p>버튼을 클릭하면 2초 후 성공(resolve) 혹은 실패(reject)가 실행됩니다.</p>
  <button id="btn">Promise 실행하기</button>
  <div id="log">실행하기 버튼 눌러주세요.</div>
</div>

<script>
  const btn = document.getElementById("btn");
  const log = document.getElementById("log");

  btn.addEventListener("click", runPromise);

  function runPromise() {
    // UI 초기화
    log.classList.remove("success", "error");
    log.innerHTML = `<span class="status-label">Loading...</span>비동기 작업 처리 중...<br>`;

    const p = new Promise(function(resolve, reject) {
      setTimeout(() => resolve("1단계\n"), 2000);
    });

    p.then(result => {
      log.innerHTML += `then #1: ${result}<br>`;
      return "2단계\n";
    })
    .then(next => {
      log.innerHTML += `then #2: ${next}<br>`;
      return "3단계\n";
    })
    .then(finalValue => {
      log.innerHTML += `then #3: ${finalValue}<br>`;
    })
    .catch(err => {
      log.innerHTML += `실패: ${err}`;
    });
  }
</script>

</body>

</html>
