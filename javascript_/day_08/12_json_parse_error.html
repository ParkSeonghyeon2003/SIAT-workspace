<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>JSON.parse() 의미</title>
  </head>
  <body>
    <p>JSON 문자열 → 자바스크립트 객체/배열로 변환합니다.</p>
    <script>
      const jsontext = '{name:"Kim","age":25}';
      const obj = JSON.parse(jsontext);

      console.log(obj.name);
      console.log(obj.age);
    </script>
  </body>
</html>
