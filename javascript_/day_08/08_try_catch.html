<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>try-catch</title>
  </head>
  <body>
    <script>
      try {
        let num = 10;
        const result = num.toUpperCase();
      } catch (err) {
        console.log("예제2 에러 이름:", err.name);
        console.log("예제2 에러 메시지:", err.message);
      }
    </script>
  </body>
</html>
