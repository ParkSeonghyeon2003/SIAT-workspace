<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>자바스크립트 변수</title>
  <script>
    let name = "홍길동";
    let alias = '자바스크립트';
    console.log(name);
    console.log(alias);

    console.log(typeof(name));
    console.log(typeof(alias));
    console.log(typeof alias);

    let start = 0; 
    let end = 123.45;
    console.log(start);
    console.log(end);
    console.log(typeof(start));
    console.log(typeof(end));

    let booleanlet = true;
    console.log(booleanlet);
    console.log(typeof(booleanlet));
  </script>
</head>
<body>
</body>
</html>
