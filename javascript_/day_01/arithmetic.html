<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기본 산술 연산자 예제</title>
  <script>
    console.log('');
    console.log('------------------------------------');
    console.log('[기본 산술 연산]');
    console.log('');
    let a1 = 10;
    let b1 = 4;
    let c1;

    c1 = a1 + b1
    console.log(a1+" + "+b1+" = "+c1); // 덧셈 -> 14
    
    c1 = a1 - b1;
    console.log(a1+" - "+b1+" = "+c1); // 뺄셈 -> 6
    
    c1 = a1 * b1;
    console.log(a1+" * "+b1+" = "+c1); // 곱셈 -> 40
    
    c1 = a1 / b1;
    console.log(a1+" / "+b1+" = "+c1); // 나눗셈 -> 2.5
    
    c1 = a1 % b1;
    console.log(a1+" % "+b1+" = "+c1); // 나머지 -> 2
    
    c1 = a1 ** b1;
    console.log(a1+" ** "+b1+" = "+c1); // 거듭제곱 -> 10000

    console.log('');
    console.log('------------------------------------');
    console.log('[복합 대입 연산자]');
    console.log('');

    let a3 = 10;
    let b3 = 4;

    a3 = a3 + b3;
    console.log(a3); // 14

    a3 += b3;
    console.log(a3); // 18

    a3 -= b3;
    console.log(a3); // 14

    a3 *= b3;
    console.log(a3); // 56

    a3 /= b3;
    console.log(a3); // 14

    a3 %= b3;
    console.log(a3); // 2

    a3 **= b3;
    console.log(a3); // 16
  </script>
</head>
<body>
  <h2>자바스크립트 + 연산자 동작 규칙</h2>
  <p>개발자도구(F12 -> Console)에서 결과를 확인하세요.</p>

  <script>
    console.log('');
    console.log('------------------------------------');
    console.log('[문자열 결합]');
    console.log('');

    let firstName = "자바스크립트";
    let lastName = "웹표준";
    let fullName = firstName + lastName;
    console.log("문자열 + 문자열 =", fullName);

    let n1 = 4;
    let priceText = "10000";

    let c2 = n1 + priceText;
    console.log("숫자 + 문자열 =", c2);

    let d = priceText + n1;
    console.log("문자열 + 숫자 =", d);

    let a2 = 10;
    let b2 = 20;
    let sum = a2 + b2;
    console.log("숫자 + 숫자 =", sum);
  </script>
</body>
</html>
