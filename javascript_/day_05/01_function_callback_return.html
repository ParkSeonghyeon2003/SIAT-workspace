<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>함수를 리턴하는 함수</title>
  </head>
  <body>
    <script>
      function returnFunction() { 
        return function() {
          alert('Hello Function...!');
        };
      }

      const foo = returnFunction();
      console.log(foo);
      foo();

      returnFunction()();
    </script>
  </body>
</html>
