<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>Function - 함수</title>
  </head>
  <body>
    <script>
      function Person(name, age) {
        this.name = name;
        this.age = age;
        this.introduce = function() {
          return `Name: ${this.name}, Age: ${this.age}`;
        }
      }

      const p1 = new Person('홍길동', 25);
      const p2 = new Person('이순신', 30);

      Person.prototype.ban = '최고반';

      console.log(p1.ban);
      console.log(p2.ban);
    </script>
  </body>
</html>
