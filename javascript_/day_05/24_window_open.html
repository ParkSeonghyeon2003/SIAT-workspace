<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>window.open</title>
    <script>
      let newWindow = null;

      function open_window() {
        const url = window.prompt(
          "원하는 URL 주소를 입력하시오.",
          "https://www.naver.com"
        );

        if (url) {
          newWindow = window.open(url);
        }
      }

      function close_window() {
        if (newWindow && !newWindow.closed) {
          newWindow.close();
        } else {
          alert("닫을 창이 없습니다.");
        }
      }
    </script>
  </head>
  <body>
    <button onclick="open_window()">새로운 창 열기</button>
    <button onclick="close_window()">열린 창 닫기</button>
  </body>
</html>
