<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>INDEX</title>
    <script>
      let header1 = null;
      let header2 = null;

      window.onload = function () {
        header1 = document.getElementById("header-1");
        header2 = document.getElementById("header-2");
        header1.innerHTML = "클릭해 보세요";
        header2.innerHTML = "클릭해 보세요";
      };

      window.onclick = function() {
        header1.innerHTML = "with getElementById() : 햇살이";
        header2.innerHTML = "with getElementById() : 좋아요";
        window.onclick = null;
      };
    </script>
  </head>
  <body>
    <h1 id="header-1"></h1>
    <h1 id="header-2"></h1>
  </body>
</html>
