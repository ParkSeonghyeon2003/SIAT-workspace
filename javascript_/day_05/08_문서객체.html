<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>window 이벤트</title>
    <script>
      window.onclick = function() {
        const headerobject = document.getElementById("header");
        headerobject.style.color = "red";
      };
    </script>
  </head>
  <body>
    <h1 id="header">HEADER</h1>
  </body>
</html>
