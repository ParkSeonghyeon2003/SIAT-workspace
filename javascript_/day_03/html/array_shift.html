<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>Array</title>
  </head>
  <body>
    <script>
      const fruits = ["Apple", "Banana", "Grape", "Strawberry"];
      fruits.shift();
      let output = "";

      for (const f of fruits) {
        output += `${f}<hr>`;
      }

      document.body.innerHTML = output;
    </script>
  </body>
</html>
