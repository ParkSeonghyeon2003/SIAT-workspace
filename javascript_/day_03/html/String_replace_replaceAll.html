<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>문자열 처리</title>
  </head>
  <body>
    <script>
      let msg = "I like JavaScript JavaScript";

      // 처음으로 만나는 단어에 한 해서 바꾸고 종료
      console.log(msg.replace("JavaScript", "HTML"));

      // 전부 바꿔삐
      console.log(msg.replaceAll("JavaScript", "HTML"));
    </script>
  </body>
</html>
