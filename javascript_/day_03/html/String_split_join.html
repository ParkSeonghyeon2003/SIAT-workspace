<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>문자열 처리 - String 객체</title>
  </head>
  <body>
    <script>
      let fruits = "사과|바나나|포도";
      let arr = fruits.split("|");
      document.body.innerHTML = arr + "<hr>";

      let result = arr.join(" / ");
      document.body.innerHTML += result;
    </script>
  </body>
</html>
