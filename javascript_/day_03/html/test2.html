<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>test2</title>
    <style>
      h1{
        color: red;
      }
    </style>
  </head>
  <body>
    <h3>String 객체의 메소드 활용</h3>
    <hr>
    <script>
      const jumin = prompt("주민번호를 입력하세요?", "810908-3234567");

      if (jumin === null) {
        document.body.innerHTML += "<h1>입력이 취소되었습니다.</h1>";
      } else if (jumin.trim() === "") {
        alert("값을 입력하세요.");
      } else if (jumin.length !== 14) {
        alert("주민번호의 길이는 14개 입니다.");
      } else if (Number.isNaN(Number(jumin.substring(0, 6)))) {
        alert("앞자리 형식을 확인하세요.");
      } else if (jumin[6] !== "-") {
        alert("앞자리 입력 후 -을 입력하세요.");
      } else if (Number.isNaN(Number(jumin.substring(7)))) {
        alert("뒷자리 형식을 확인하세요.");
      } else if (jumin[7] === "1" || jumin[7] === "3") {
        document.body.innerHTML += "<div>남자</div>";
        document.body.style.background = "#565698";
      } else if (jumin[7] === "2" || jumin[7] === "4") {
        document.body.innerHTML += "<div>여자</div>";
        document.body.style.background = "mistyrose";
      } else {
        alert("형식이 맞지 않습니다.");
        document.body.innerHTML += "<h1>형식에 맞지 않습니다.</h1>";
      }
    </script>
  </body>
</html>
